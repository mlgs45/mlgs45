name: waka-readme

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: last_7_days
          SHOW_TITLE: "false"
          BLOCKS: "░▒▓█"
          CODE_LANG: txt
